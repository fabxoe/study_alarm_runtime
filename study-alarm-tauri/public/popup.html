<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>알림</title>
  <style>
    :root {
      --bg: #13121C;
      --bg-panel: #1E1C2A;
      --text-main: #FFFFFF;
      --text-muted: #8A87A8;
      --purple-main: #5B45E0;
      --purple-glow: rgba(91, 69, 224, 0.4);
      --border: #2A2838;
      --border-focus: #3A3850;
    }
    html, body {
      margin: 0;
      padding: 0;
      background: #1A1926;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      user-select: none; /* 텍스트 선택 방지 */
      -webkit-user-select: none;
    }
    .popup-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      border-radius: 24px;
      background: #1A1926;
    }
    .drag-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1; /* 드래그 영역은 아래에 */
    }
    .content-layer {
      position: absolute;
      z-index: 10;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center; /* 다시 중앙 집중 배치 */
      padding: 25px 20px;
      box-sizing: border-box;
      text-align: center;
      gap: 12px; /* 적절한 간격 복구 */
      pointer-events: none;
    }
    .icon-area {
      font-size: 70px; /* 60px에서 약간 상향 */
      margin-bottom: 5px;
      filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.1));
    }
    .icon-img {
      width: 80px;
      height: 80px;
      object-fit: contain;
    }
    .title {
      font-size: 20px; /* 18px에서 약간 상향 */
      font-weight: 700;
      color: var(--text-main);
      margin: 0;
    }
    .message {
      font-size: 14px; /* 13px에서 약간 상향 */
      color: var(--text-muted);
      line-height: 1.4;
      margin: 0;
      padding: 0 10px;
    }
    .btn {
      width: 90%;
      padding: 15px; /* 12px에서 상향 */
      border-radius: 14px;
      border: none;
      font-size: 15px;
      font-weight: 700;
      color: white;
      background: var(--purple-main);
      box-shadow: 0 4px 15px var(--purple-glow);
      cursor: pointer;
      transition: 0.2s;
      margin-top: 10px; /* 버튼 위쪽 공간 확보 */
      position: relative;
      z-index: 10;
      pointer-events: auto; /* 드래그 영역 위에서도 클릭 가능하게 */
    }
    .btn:hover {
      background: #6A56E6;
      transform: translateY(-2px);
    }
    .btn:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>
  <!-- 팝업 컨테이너 전체를 드래그 가능 영역으로 설정 (버튼 제외) -->
  <div class="popup-container">
    <!-- 창 전체 드래그를 위한 레이어 -->
    <div class="drag-layer" data-tauri-drag-region></div>
    
    <!-- 실제 상호작용을 위한 콘텐츠 레이어 -->
    <div class="content-layer">
    <div class="icon-area" id="icon">⏰</div>
    <h1 class="title" id="title">알람</h1>
    <p class="message" id="message">시간이 되었습니다.</p>
    <button class="btn" id="confirmBtn" onclick="handleBtnClick(this)">확인</button>
  </div>

  <script>
    // URL 파라미터 읽기
    const params = new URLSearchParams(window.location.search);
    const title = params.get('title') || '알람';
    const msg = params.get('msg') || '시간이 되었습니다.';
    const kind = params.get('kind') || 'info';

    document.getElementById('title').innerText = title;
    document.getElementById('message').innerText = msg;

    // 종류에 따른 아이콘 설정
    const iconEl = document.getElementById('icon');
    if (kind === 'test') {
      iconEl.innerText = '🧪'; // 시약병 아이콘
      iconEl.style.fontSize = '90px'; // 시약병은 조금 더 크게
    } else {
      iconEl.innerText = '⏰'; // 기본 시계 아이콘
    }

    // 이모지 매핑
    const icons = {
      "study": "📚",
      "break": "☕",
      "lunch": "🍱",
      "done": "🤝🏻",
      "test": "🧪",
      "info": "⏰"
    };
    document.getElementById('icon').textContent = icons[kind] || "⏰";

    // 창 로드 즉시 포커스 요청 (첫 클릭에 버튼 동작하도록)
    window.addEventListener('DOMContentLoaded', () => { window.focus(); });
    window.focus();
    try {
      const tauri = window.__TAURI__;
      if (tauri && tauri.window && tauri.window.getCurrentWindow) {
        tauri.window.getCurrentWindow().setFocus();
      } else if (tauri && tauri.webviewWindow && tauri.webviewWindow.getCurrentWebviewWindow) {
        tauri.webviewWindow.getCurrentWebviewWindow().setFocus();
      }
    } catch(_) {}

    async function closePopup() {
      try {
        const tauri = window.__TAURI__;
        if (tauri && tauri.event && tauri.event.emit) {
          await tauri.event.emit("stopsound");
        }
        if (tauri && tauri.window && tauri.window.getCurrentWindow) {
          const win = tauri.window.getCurrentWindow();
          await win.close();
        } else {
          window.close();
        }
      } catch(e) {
        console.error("Close failed:", e);
        window.close();
      }
    }

    function handleBtnClick(el) {
      el.textContent = "닫는 중...";
      el.style.opacity = "0.5";
      closePopup();
    }



    // 화면이 완전히 준비되면 윈도우 표시 (100ms 지연으로 흰색 깜빡임 완전 차단)
    setTimeout(() => {
      try {
        const tauri = window.__TAURI__;
        if (tauri && tauri.core && tauri.core.invoke) {
          tauri.core.invoke("show_window");
        }
      } catch (err) {
        console.error("Window show failed:", err);
      }
    }, 100);
  </script>
</body>
</html>
